# Go API deployment compose file.
# Used for production deployment on OCI instance.
# Dev infra (Postgres, Redis) lives in the root docker-compose.yml.

services:
  go-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: altune-go-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: altune-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: altune
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: altune
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U altune -d altune"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: altune-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
  redis-data:
